name: Build and deploy Python project to Azure Function App - helloworld-func-app

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' 
  PYTHON_VERSION: '3.11' 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # 굳이 venv를 만들고 activate 할 필요 없이, 배포용 아티팩트만 잘 만들면 됩니다.
      # 테스트(Pytest 등)를 실행해야 한다면 여기서 의존성을 설치하고 테스트를 수행합니다.
      
      - name: Zip artifact for deployment
        # venv 폴더나 불필요한 파일(.git 등)을 제외하고 압축합니다.
        # requirements.txt는 반드시 포함되어야 합니다.
        run: |
          zip release.zip ./* -r -x "venv/*" -x ".git/*" -x ".github/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write 
      contents: read 

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      # 압축을 풀 필요가 없습니다. Azure Functions Action은 zip 파일 자체를 배포할 수 있습니다.
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_... }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_... }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_... }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'helloworld-func-app'
          slot-name: 'Production'
          package: 'release.zip' # 다운로드 받은 zip 파일을 바로 지정
          # Flex Consumption이나 Linux Consumption에서는 아래 설정이 중요할 수 있습니다.
          # 앱 설정에 SCM_DO_BUILD_DURING_DEPLOYMENT=true 가 되어 있어야 합니다.
