name: Build and deploy Python project to Azure Function App

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' 
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: read 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zip artifact for deployment (Flex Consumption 방식)
        run: |
          zip -r release.zip . \
            -x ".venv/*" \
            -x "venv/*" \
            -x ".git/*" \
            -x ".github/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".python_packages/*" \
            -x "local.settings.json"

      - name: 🔍 Debug - Verify zip contents
        run: |
          echo "=== ZIP 파일 검사 ==="
          echo "--- 필수 파일 확인 ---"
          unzip -l release.zip | grep -E "(function_app\.py|host\.json|requirements\.txt)"
          echo "--- 전체 크기 ---"
          ls -lh release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Flex Consumption에서 지원되지 않는 설정 제거
      - name: Remove unsupported App Settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            az functionapp config appsettings delete \
              --name ${{ secrets.AZURE_FUNCTIONAPP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --setting-names SCM_DO_BUILD_DURING_DEPLOYMENT ENABLE_ORYX_BUILD || true

      # Flex Consumption은 Azure CLI를 통한 직접 배포 사용
      - name: 'Deploy to Azure Functions (Flex Consumption)'
        uses: azure/cli@v2
        with:
          inlineScript: |
            az functionapp deployment source config-zip \
              --name ${{ secrets.AZURE_FUNCTIONAPP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --src release.zip \
              --build-remote true



