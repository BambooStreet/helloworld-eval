# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - helloworld-func-app-v2

on:
  push:
    branches:
      - develop
    paths-ignore:
      - 'test_data/**'  # test_data 폴더 전체 무시
      - 'docs/**'        # 예: 문서 폴더
      - '*.md'           # 모든 마크다운 파일
      - '.gitignore'
      - '.funcignore'
      - '.commit_template'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'  # set this to the path to your web app project, defaults to the repository root
  PYTHON_VERSION: '3.11'               # set this to the python version to use (supports 3.6, 3.7, 3.8)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          mkdir -p .python_packages/lib/python${{ env.PYTHON_VERSION }}/site-packages
          cp -r .venv/lib/python${{ env.PYTHON_VERSION }}/site-packages/* .python_packages/lib/python${{ env.PYTHON_VERSION }}/site-packages/

      - name: Zip artifact for deployment
        run: |
          echo "Zipping source code and dependencies..."
          zip -r release.zip . \
            -x ".git/*" \
            ".github/*" \
            "__pycache__/*" \
            "*.pyc" \
            "*.zip" \
            "venv/*"  # Exclude local venv
          zip -r release.zip .python_packages  # Add installed packages

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B51AABE81AB54614A688140E5CD15A21 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E8839995F2FC441B9A929EE4F5C5BCEB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_38315503FB544283B25778BC0432E22A }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: 'helloworld-func-app-v2'
          package: release.zip
          scm-do-build-during-deployment: false  # Not needed for Flex
          enable-oryx-build: false              # Not needed for Flex
          remote-build: false                   # Explicitly set for Flex (default)
