name: Build and deploy Python project to Azure Function App

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' 
  PYTHON_VERSION: '3.10' # Azure 버전과 일치 (3.10 권장)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: read 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (Azure Compatibility Force)
        run: |
          # 1. 기존 폴더 클린업
          rm -rf .python_packages
          mkdir -p .python_packages/lib/site-packages
          
          # 2. [핵심] 호환성 강제 옵션 사용
          # --platform manylinux2014_x86_64: Azure에서 100% 돌아가는 호환 버전 지정
          # --only-binary=:all: 소스 컴파일 금지 (바이너리만 설치)
          # --python-version 3.10: 파이썬 버전 명시
          pip install \
            --target="./.python_packages/lib/site-packages" \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.10 \
            --only-binary=:all: \
            --upgrade \
            -r requirements.txt
            
      - name: Zip artifact for deployment
        run: |
          # 숨김 폴더(.python_packages)를 명시적으로 포함
          zip -r release.zip .python_packages . -x "venv/*" -x ".git/*" -x ".github/*" -x "__pycache__/*"

      # [★여기 수정됨★] 스토리지 안 쓰고 로그에 파일 목록 찍기
      - name: 🔍 Debug - List Zip Contents
        run: |
          echo "========== ZIP 파일 내부 검사 시작 =========="
          # .python_packages 폴더가 들어있는지 검사
          if unzip -l release.zip | grep -q ".python_packages/lib/site-packages"; then
            echo "✅ 성공: .python_packages 폴더가 존재합니다."
            echo "--- 포함된 파일 일부 예시 ---"
            unzip -l release.zip | grep ".python_packages" | head -n 20
          else
            echo "❌ 실패: .python_packages 폴더가 없습니다!!"
            # 전체 목록 출력해서 뭐가 들어갔나 확인
            unzip -l release.zip
            exit 1 
          fi
          echo "==========================================="

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'helloworld-func-app-v2'
          slot-name: 'Production'
          package: 'release.zip'

