name: Build and deploy Python project to Azure Function App

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' 
  PYTHON_VERSION: '3.10' # Azure Function App의 버전과 일치시킬 것 (3.10 or 3.11)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: read 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (Flex Standard)
        run: |
          # 1. Flex Consumption 표준 라이브러리 경로 생성
          mkdir -p .python_packages/lib/site-packages
          
          # 2. 해당 경로에 패키지 설치 (--target 옵션 사용)
          pip install --target="./.python_packages/lib/site-packages" -r requirements.txt

      - name: Zip artifact for deployment
        run: |
          # [핵심 해결책]
          # .python_packages 폴더는 점(.)으로 시작하는 숨김 폴더라서 
          # 그냥 *로 압축하면 빠지는 경우가 많습니다. 
          # 반드시 명시적으로 적어서 압축해야 합니다.
          zip -r release.zip .python_packages . -x "venv/*" -x ".git/*" -x ".github/*" -x "__pycache__/*"


      # [검증용] 만들어진 zip 파일을 GitHub 웹페이지에서 다운받을 수 있게 업로드
      - name: Upload Build Artifact for Debugging
        uses: actions/upload-artifact@v4
        with:
          name: debug-release-package
          path: release.zip

      # ... (Azure Login 및 Deploy 단계) ...
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'helloworld-func-app-v2'
          slot-name: 'Production'
          package: 'release.zip'

