name: Deploy to Azure Function (Flex)

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:           # ← 최상단(전체 워크플로 기본 권한)
  contents: read
  id-token: write      # ← OIDC 토큰 발급 허용

env:
  FUNCTION_APP_NAME: helloworld-func-app-v2
  RESOURCE_GROUP: helloworld_resource_group
  STORAGE_ACCOUNT: helloworld844b
  STORAGE_CONTAINER: function-releases
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v3
      - run: |
          mkdir -p .python_packages/lib/python${{ env.PYTHON_VERSION }}/site-packages
          uv pip install --system --no-cache -r requirements.txt \
            --target .python_packages/lib/python${{ env.PYTHON_VERSION }}/site-packages
          zip -r release.zip . -x ".git/*" ".github/*" "__pycache__/*" "*.pyc" "*.zip" "venv/*"
          zip -r release.zip .python_packages
      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: release.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B51AABE81AB54614A688140E5CD15A21 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E8839995F2FC441B9A929EE4F5C5BCEB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_38315503FB544283B25778BC0432E22A }}

      - name: Upload ZIP & Set WEBSITE_RUN_FROM_PACKAGE (via connection string)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            set -e
      
            if [ -z "${{ secrets.STORAGE_CONNECTION_STRING }}" ]; then
              echo "❌ STORAGE_CONNECTION_STRING is empty. Add repo secret first."
              exit 1
            fi
      
            ZIP_NAME="release-$(date +%Y%m%d%H%M%S).zip"
            mv release.zip "$ZIP_NAME"
      
            # 컨테이너 생성 (있으면 통과)
            az storage container create \
              --name ${{ env.STORAGE_CONTAINER }} \
              --connection-string "${{ secrets.STORAGE_CONNECTION_STRING }}" || true
      
            # 업로드
            az storage blob upload \
              --container-name ${{ env.STORAGE_CONTAINER }} \
              --name "$ZIP_NAME" \
              --file "$ZIP_NAME" \
              --connection-string "${{ secrets.STORAGE_CONNECTION_STRING }}" \
              --overwrite
      
            # SAS 생성 (읽기 권한, 30일)
            EXPIRY=$(date -u -d "30 days" '+%Y-%m-%dT%H:%MZ')
            SAS_URL=$(az storage blob generate-sas \
              --container-name ${{ env.STORAGE_CONTAINER }} \
              --name "$ZIP_NAME" \
              --permissions r \
              --expiry "$EXPIRY" \
              --full-uri \
              --connection-string "${{ secrets.STORAGE_CONNECTION_STRING }}" \
              | tr -d '"')
      
            # Function App에 설정
            az functionapp config appsettings set \
              --name ${{ env.FUNCTION_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --settings WEBSITE_RUN_FROM_PACKAGE="$SAS_URL"
      
            az functionapp restart --name ${{ env.FUNCTION_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}


