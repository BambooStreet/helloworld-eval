name: Build and deploy Python project to Azure Function App - helloworld-func-app-v2

on:
  push:
    branches: [ develop ]
    paths-ignore:
      - 'test_data/**'
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - '.funcignore'
      - '.commit_template'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  FUNCTION_APP_NAME: 'helloworld-func-app-v2'
  RESOURCE_GROUP: 'helloworld_resource_group'
  STORAGE_ACCOUNT: 'helloworld844b'        # ← 네가 보여준 Storage Account
  STORAGE_CONTAINER: 'function-releases'   # 없으면 자동 생성
  SAS_EXPIRY_DAYS: '30'                    # SAS 만료일(일 단위)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies (uv → .python_packages)
        run: |
          mkdir -p .python_packages/lib/python${{ env.PYTHON_VERSION }}/site-packages
          uv pip install --system --no-cache -r requirements.txt \
            --target .python_packages/lib/python${{ env.PYTHON_VERSION }}/site-packages

      - name: Zip artifact for deployment
        run: |
          echo "Zipping source and dependencies..."
          zip -r release.zip . \
            -x ".git/*" ".github/*" "__pycache__/*" "*.pyc" "*.zip" "venv/*"
          zip -r release.zip .python_packages

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B51AABE81AB54614A688140E5CD15A21 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E8839995F2FC441B9A929EE4F5C5BCEB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_38315503FB544283B25778BC0432E22A }}

      - name: Deploy via WEBSITE_RUN_FROM_PACKAGE (Blob + SAS)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            set -e

            # 1) 컨테이너 준비
            az storage container create \
              --name ${{ env.STORAGE_CONTAINER }} \
              --account-name ${{ env.STORAGE_ACCOUNT }} \
              --auth-mode login || true

            # 2) ZIP 이름 고유화 & 업로드
            ZIP_NAME="release-$(date +%Y%m%d%H%M%S).zip"
            mv release.zip "$ZIP_NAME"

            az storage blob upload \
              --account-name ${{ env.STORAGE_ACCOUNT }} \
              --container-name ${{ env.STORAGE_CONTAINER }} \
              --name "$ZIP_NAME" \
              --file "$ZIP_NAME" \
              --auth-mode login \
              --overwrite

            # 3) SAS URL 생성
            EXPIRY=$(date -u -d "${{ env.SAS_EXPIRY_DAYS }} days" '+%Y-%m-%dT%H:%MZ')
            SAS_URL=$(az storage blob generate-sas \
              --account-name ${{ env.STORAGE_ACCOUNT }} \
              --container-name ${{ env.STORAGE_CONTAINER }} \
              --name "$ZIP_NAME" \
              --permissions r \
              --expiry "$EXPIRY" \
              --auth-mode login --full-uri | tr -d '"')

            echo "SAS_URL generated: $SAS_URL"

            # 4) 앱 설정에 WEBSITE_RUN_FROM_PACKAGE 적용
            az functionapp config appsettings set \
              --name ${{ env.FUNCTION_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --settings WEBSITE_RUN_FROM_PACKAGE="$SAS_URL" \
                          SCM_DO_BUILD_DURING_DEPLOYMENT=false \
                          ENABLE_ORYX_BUILD=false

            # 5) 재시작 + 트리거 동기화
            az functionapp restart \
              --name ${{ env.FUNCTION_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }}

            az functionapp sync-functions \
              --name ${{ env.FUNCTION_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }}

            echo "Deployment completed."
