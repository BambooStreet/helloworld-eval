name: Build and deploy Python project to Azure Function App - helloworld-func-app-v2

on:
  push:
    branches:
      - develop
    paths-ignore:
      - 'test_data/**'  # test_data 폴더 전체 무시
      - 'docs/**'       # 예: 문서 폴더
      - '*.md'          # 모든 마크다운 파일
      - '.gitignore'
      - '.funcignore'
      - '.commit_template'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'  # 프로젝트 루트 경로
  PYTHON_VERSION: '3.11'               # 사용할 Python 버전

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies (using uv)
        run: |
          mkdir -p .python_packages/lib/python${{ env.PYTHON_VERSION }}/site-packages
          uv pip install --system --no-cache -r requirements.txt --target .python_packages/lib/python${{ env.PYTHON_VERSION }}/site-packages

      - name: Zip artifact for deployment
        run: |
          echo "Zipping source code and dependencies..."
          zip -r release.zip . \
            -x ".git/*" \
            ".github/*" \
            "__pycache__/*" \
            "*.pyc" \
            "*.zip" \
            "venv/*"
          # 설치된 패키지 추가
          zip -r release.zip .python_packages

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B51AABE81AB54614A688140E5CD15A21 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E8839995F2FC441B9A929EE4F5C5BCEB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_38315503FB544283B25778BC0432E22A }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'helloworld-func-app-v2'
          package: release.zip
          scm-do-build-during-deployment: false  # Flex에서는 사용 안 됨
          enable-oryx-build: false              # Flex에서는 사용 안 됨
          remote-build: false                   # 명시적으로 설정 (기본값)
