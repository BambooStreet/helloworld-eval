name: Build and deploy Python project to Azure Function App

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' 
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: read 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 디스크 공간 확보
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Azure Functions Core Tools
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
          sudo mv microsoft.gpg /etc/apt/trusted.gpg.d/microsoft.gpg
          sudo sh -c 'echo "deb [arch=amd64] https://packages.microsoft.com/repos/microsoft-ubuntu-$(lsb_release -cs)-prod $(lsb_release -cs) main" > /etc/apt/sources.list.d/dotnetdev.list'
          sudo apt-get update
          sudo apt-get install azure-functions-core-tools-4

      - name: Install dependencies (no cache)
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: 🔍 Debug - Verify project structure
        run: |
          echo "=== 프로젝트 구조 확인 ==="
          ls -la function_app.py host.json requirements.txt
          echo "--- 디스크 사용량 ---"
          df -h

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Flex Consumption에서 지원되지 않는 설정 제거
      - name: Remove unsupported App Settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            az functionapp config appsettings delete \
              --name ${{ secrets.AZURE_FUNCTIONAPP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --setting-names SCM_DO_BUILD_DURING_DEPLOYMENT ENABLE_ORYX_BUILD || true

      # Azure Functions Core Tools를 사용한 배포
      - name: 'Deploy to Azure Functions (Flex Consumption)'
        run: |
          func azure functionapp publish ${{ secrets.AZURE_FUNCTIONAPP_NAME }} --python --build remote

      # 배포 완료 대기
      - name: Wait for deployment to complete
        uses: azure/cli@v2
        with:
          inlineScript: |
            echo "Waiting for deployment to stabilize..."
            sleep 60
            
            echo "Checking function app status..."
            az functionapp show \
              --name ${{ secrets.AZURE_FUNCTIONAPP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --query "state" -o tsv
            
            echo "Listing functions..."
            az functionapp function list \
              --name ${{ secrets.AZURE_FUNCTIONAPP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --query "[].name" -o tsv || echo "Functions not yet available (this is normal for Flex Consumption)"



