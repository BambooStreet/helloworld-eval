name: Build and deploy Python project to Azure Function App

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' 
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: read 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zip artifact for deployment (Flex Consumption 방식)
        run: |
          # Flex Consumption: 소스코드 + requirements.txt만 배포
          # Azure가 원격에서 빌드함
          zip -r release.zip . \
            -x ".venv/*" \
            -x "venv/*" \
            -x ".git/*" \
            -x ".github/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".python_packages/*" \
            -x "local.settings.json"

      - name: 🔍 Debug - Verify zip contents
        run: |
          echo "=== ZIP 파일 검사 ==="
          echo "--- 필수 파일 확인 ---"
          unzip -l release.zip | grep -E "(function_app\.py|host\.json|requirements\.txt)"
          echo "--- 전체 크기 ---"
          ls -lh release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # [수정] FUNCTIONS_WORKER_RUNTIME 제거 - Flex Consumption에서 금지됨
      - name: Configure App Settings for Remote Build
        uses: azure/cli@v2
        with:
          inlineScript: |
            az functionapp config appsettings set \
              --name helloworld-func-app-v2 \
              --resource-group <YOUR_RESOURCE_GROUP> \
              --settings \
                "ENABLE_ORYX_BUILD=true" \
                "SCM_DO_BUILD_DURING_DEPLOYMENT=true"

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'helloworld-func-app-v2'
          slot-name: 'Production'
          package: 'release.zip'
          scm-do-build-during-deployment: true
          enable-oryx-build: true



