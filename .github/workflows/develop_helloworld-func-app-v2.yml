# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - helloworld-func-app-v2

on:
  push:
    branches:
      - develop
    paths-ignore:
      - 'test_data/**'           # test_data 폴더 전체 무시
      - 'docs/**'                # 예: 문서 폴더
      - '*.md'                   # 모든 마크다운 파일
      - '.gitignore'
      - '.funcignore'
      - '.commit_template'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  PYTHON_VERSION: '3.11' # set this to the python version to use (supports 3.6, 3.7, 3.8)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate  # venv 활성화

      - name: Install dependencies  # 여기가 핵심: -t ./ 로 루트에 설치
        run: |
          source venv/bin/activate  # 재활성화 (중요!)
          pip install -r requirements.txt -t .  # 루트에 패키지 복사 (no venv)

      - name: Zip artifact for deployment
        run: |
          # 디버깅: 파일 목록
          echo "Files before zip:"
          ls -la
          
          # .funcignore 확인
          if [ ! -f .funcignore ]; then
            echo "ERROR: .funcignore missing!"
            exit 1
          fi
          echo ".funcignore contents:"
          cat .funcignore

          # ZIP 생성: 루트 파일들 최상위로 (폴더 구조 피함)
          zip -r release.zip \
            .funcignore \
            function_app.py \
            host.json \
            requirements.txt \
            configs/ \
            prompts/ \
            .python_packages/ || true  # 에러 무시 (없는 폴더 스킵)
          
          # 추가 파일들 (위에서 누락된 경우)
          find . -maxdepth 1 -type f -not -path "./venv/*" -not -path "./release.zip" -not -path "./.git/*" -exec zip -r release.zip {} \;

          # 제외 패턴 적용 (funcignore 시뮬)
          # ZIP에서 test_data 등 제거 (선택적, funcignore가 동작하면 불필요)
          zip -d release.zip "test_data/*" 2>/dev/null || true

          echo "=== ZIP STRUCTURE (must be flat root) ==="
          unzip -l release.zip | head -20  # 로그에 출력

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
  
      - name: Unzip artifact for deployment
        run: |
          unzip release.zip -d .
          rm release.zip
          echo "After unzip:"
          ls -la
  
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B51AABE81AB54614A688140E5CD15A21 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E8839995F2FC441B9A929EE4F5C5BCEB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_38315503FB544283B25778BC0432E22A }}
  
      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: 'helloworld-func-app-v2'
          package: .                    # 현재 폴더 (unzip된 곳)
          clean: true  # 이전 파일 삭제 (충돌 방지)
          respect-funcignore: true
          remote-build: true
            






