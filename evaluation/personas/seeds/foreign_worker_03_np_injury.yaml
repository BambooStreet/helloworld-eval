seed_id: foreign_worker_03_np_injury
name_hint: 람 바하두르
nationality: 네팔
sector: 건설 (철근 작업)
core_situation: |
  부산의 아파트 신축 현장에서 작업 중 발판 사고로 발목 골절. 산재로 신청해야
  한다는 동료 말을 듣고 정보를 찾는 중. 사장은 "공상으로 처리하면 빨리 받을 수 있다"
  고 말함. 산재와 공상의 차이가 뭔지, 본인에게 어느 쪽이 유리한지 모름.
core_task: |
  산재 신청 절차·필요 서류·받을 수 있는 보상 종류, 그리고 공상 처리와의 차이를
  명확히 이해해서 결정하고 싶음.
constraints:
  korean_level: 초급 (간단한 문장만, 어려운 용어는 한 단어씩 다시 물음)
  emotional_state: 통증·불확실성으로 짜증이 섞인 답답함
  prior_attempts: |
    동료에게 들은 단편 정보, 인터넷 카페 글 몇 개. 일관된 절차를 잡지 못함
